name: CI

on:
  push:
    branches:
      - main
  pull_request:
  # Temporary: lets us dispatch a trusted-event run on this feature branch to
  # validate the real cache write/read round-trip pre-merge. Removed once
  # verified (see plans/verify-dogfooding-e2e.plan.md Step 5).
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # --all: pull_request checkouts don't have a local `main` ref for Nx's
      # default git-diff base, so diff-based format:check always fails here.
      - run: npx nx format:check --all

  build:
    runs-on: ubuntu-latest
    # GitHub's cache-save API requires `actions: write` on the job token;
    # `actions: read` (the workflow-level default) only permits restores, so
    # every write attempt from the self-hosted cache server here silently
    # no-ops without this override.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      # node, not `npx op-nx-github-cache-serve`: npm only links a workspace
      # bin shim if its target exists at `npm ci` time, and dist/bin/*.js
      # doesn't exist until the build step above runs. This is a
      # self-consumption-only quirk (consuming repos install the published
      # package with dist/ already built), so the README's own `npx <bin>`
      # snippet stays correct for consumers -- only this repo's own dogfood
      # wiring needs the direct node invocation.
      # setsid detaches the server into its own session so it survives this
      # step's exit -- GitHub Actions' runner kills a step's whole process
      # group when the step's script finishes, and a plain `cmd &` background
      # job stays in that group. Without setsid, the server was silently dead
      # before any later step could reach it (verified: zero requests ever
      # arrived at the real server in CI, despite the same code working
      # locally every time -- a local shell doesn't tear down process groups
      # between commands the way Actions does between steps).
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - run: npm run build

  typecheck:
    runs-on: ubuntu-latest
    # See build job's comment: actions: write is required for cache saves.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # DEBUG (TEMPORARY): which native nx binary actually got installed.
      - run: ls node_modules/@nx/ | grep nx- || echo "NO NATIVE NX PACKAGE FOUND"
      - run: npx nx build @op-nx/github-cache
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      # DEBUG (TEMPORARY): direct reachability probe, bypassing Nx entirely.
      - name: Debug curl probe
        run: curl -v "$NX_SELF_HOSTED_REMOTE_CACHE_SERVER/v1/cache/deadbeefdeadbeef"
      - run: npm run typecheck
        env:
          NX_VERBOSE_LOGGING: 'true'

  test:
    runs-on: ubuntu-latest
    # See build job's comment: actions: write is required for cache saves.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - run: npm run test

  publish-mirror:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      - run: node packages/op-nx-github-cache/dist/bin/publish-mirror.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
