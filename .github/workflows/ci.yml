name: CI

on:
  push:
    branches:
      - main
  pull_request:
  # TEMPORARY (debug): trusted trigger to verify the remote-cache round-trip
  # pre-merge. Remove before merge.
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # --all: pull_request checkouts don't have a local `main` ref for Nx's
      # default git-diff base, so diff-based format:check always fails here.
      - run: npx nx format:check --all

  build:
    runs-on: ubuntu-latest
    # GitHub's cache-save API requires `actions: write` on the job token;
    # `actions: read` (the workflow-level default) only permits restores, so
    # every write attempt from the self-hosted cache server here silently
    # no-ops without this override.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      # node, not `npx op-nx-github-cache-serve`: npm only links a workspace
      # bin shim if its target exists at `npm ci` time, and dist/bin/*.js
      # doesn't exist until the build step above runs. This is a
      # self-consumption-only quirk (consuming repos install the published
      # package with dist/ already built), so the README's own `npx <bin>`
      # snippet stays correct for consumers -- only this repo's own dogfood
      # wiring needs the direct node invocation.
      # setsid detaches the server into its own session so it survives this
      # step's exit -- GitHub Actions' runner kills a step's whole process
      # group when the step's script finishes, and a plain `cmd &` background
      # job stays in that group.
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - run: npm run build

  typecheck:
    runs-on: ubuntu-latest
    # See build job's comment: actions: write is required for cache saves.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      # @actions/cache (the cache server's Actions-cache backend) reads
      # ACTIONS_RESULTS_URL / ACTIONS_RUNTIME_TOKEN, which GitHub injects into
      # JavaScript actions but NOT into `run:` shell steps -- so the
      # run:-spawned server can't reach the cache service and every save/restore
      # silently no-ops (verified: "Cache Service Url not found"). Re-export them
      # from a JS action into $GITHUB_ENV so the server inherits them. Gated to
      # trusted events: the cache is write-gated to those anyway, and this keeps
      # ACTIONS_RUNTIME_TOKEN out of untrusted PR jobs' run-step environment.
      - name: Export Actions cache runtime env
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group'
        uses: actions/github-script@v7
        with:
          script: |
            for (const key of [
              'ACTIONS_RESULTS_URL',
              'ACTIONS_CACHE_URL',
              'ACTIONS_RUNTIME_TOKEN',
              'ACTIONS_CACHE_SERVICE_V2',
            ]) {
              const value = process.env[key];

              if (!value) {
                continue;
              }

              if (key === 'ACTIONS_RUNTIME_TOKEN') {
                core.setSecret(value);
              }

              core.exportVariable(key, value);
            }
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    # See build job's comment: actions: write is required for cache saves.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - run: npm run test

  publish-mirror:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      - run: node packages/op-nx-github-cache/dist/bin/publish-mirror.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
