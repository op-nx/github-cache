name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # --all: pull_request checkouts don't have a local `main` ref for Nx's
      # default git-diff base, so diff-based format:check always fails here.
      - run: npx nx format:check --all

  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # Bootstrap build, cold: no server is up yet, so this pass only writes the
      # local cache and produces dist/bin/serve.js. It cannot itself seed the
      # remote -- that is what the reset + second build below are for.
      - run: npm run build
      # Start the cache server from the JUST-BUILT binary (never a prebuilt or
      # published copy) so CI dogfoods THIS build's server. A JS action so GitHub
      # hands it the Actions cache runtime env, which it passes to the server.
      - uses: ./start-cache-server
        with:
          command: node packages/op-nx-github-cache/dist/bin/serve.js
      # Break the chicken-and-egg: the bootstrap left `build` as a local hit, and
      # a local hit is never re-uploaded, so `build` would never reach the remote
      # (and thus never the Release mirror). Dropping the local cache forces the
      # next build to be a genuine miss -> Nx PUTs the outputs to the server
      # (gated to trusted events server-side). This is what makes `build` -- and
      # any future build target -- restorable cross-OS/-arch from the mirror.
      - run: npx nx reset
      - run: npm run build

  typecheck:
    runs-on: ubuntu-24.04-arm
    # contents: read only. The Actions-cache backend authenticates with
    # ACTIONS_RUNTIME_TOKEN (handed to the server by the start-cache-server
    # action, a JS action), not GITHUB_TOKEN, so no actions:write is needed;
    # writes are gated to trusted events by GitHub server-side regardless.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # Bootstrap the package so dist/bin/serve.js exists for the action to run.
      - run: npx nx build @op-nx/github-cache
      # A JS action so GitHub hands it the Actions cache runtime env
      # (ACTIONS_RUNTIME_TOKEN / ACTIONS_RESULTS_URL), which it passes to the
      # server by inheritance. Self-gates to trusted events; fails loudly if that
      # env is missing. `command` points at the built bin directly because npm
      # only links the bin shim when dist/ exists at install time.
      - uses: ./start-cache-server
        with:
          command: node packages/op-nx-github-cache/dist/bin/serve.js
      - run: npm run typecheck

  # Unit tests are OS-portable by construction (pure logic / mocked IO), so their
  # Nx hash is byte-identical on every OS. Running them on a single OS seeds ONE
  # cache entry that both Linux and Windows devs hit locally -- running the matrix
  # here would just make the second leg a redundant cache hit. OS-specific behavior
  # lives in test-integration below.
  test:
    runs-on: ubuntu-24.04-arm
    # See typecheck job: contents: read only; cache auth uses ACTIONS_RUNTIME_TOKEN.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # Bootstrap the package so dist/bin/serve.js exists for the action to run.
      - run: npx nx build @op-nx/github-cache
      - uses: ./start-cache-server
        with:
          command: node packages/op-nx-github-cache/dist/bin/serve.js
      - run: npm run test

  # Integration tests hit real OS surface (real sockets, real filesystem/tmpdir),
  # so their hash carries an `env:RUNNER_OS` discriminator (see nx.json's integration
  # inputs): "Linux" vs "Windows" -> a Linux cache never satisfies a Windows run, so
  # BOTH legs actually run. RUNNER_OS is read from process.env (no command execution)
  # and is set reliably per-OS by the runner -- unlike a `runtime` command (evaluated
  # to the linux value inside Nx's hasher on the arm64 Windows runner) or `env:OS`
  # (empty on the GitHub Windows runner). Trade-off: RUNNER_OS is unset off-CI, so a
  # local `nx integration` runs fresh rather than hitting this cache; the fast unit
  # `test` tier is the cross-OS-hittable one. fail-fast off so a Windows-only failure
  # never hides the Ubuntu result. windows-11-arm also exercises start-cache-server's
  # detached-spawn path (deferred by the selfcheck on win32).
  integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, windows-11-arm]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # Bootstrap the package so dist/bin/serve.js exists for the action to run.
      - run: npx nx build @op-nx/github-cache
      - uses: ./start-cache-server
        with:
          command: node packages/op-nx-github-cache/dist/bin/serve.js
      - run: npm run integration

  # The two JS actions are otherwise exercised only on Ubuntu. These standalone
  # self-checks cover their gate/guard/skip logic (and publish-mirror's exit-status
  # propagation) on Windows -- paths the test matrix's cache-server start does not
  # reach. Node built-ins only -- no npm ci. Arch has no value here (pure JS), so
  # x64 windows-latest is fine.
  windows-selfcheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
      - run: node start-cache-server/selfcheck.cjs
      - run: node publish-mirror/selfcheck.cjs

  publish-mirror:
    # WAIT for every cache-producing job so their hashes are already in the Actions
    # cache when this mirrors -- otherwise the slow Windows/arm64 `integration` hash
    # lands AFTER this job and is only mirrored a run later (its os+arch-sensitive
    # hash would never be locally hittable until then). But do NOT let a test/
    # integration FAILURE block mirroring: `!cancelled()` + an explicit build-success
    # gate keeps this running whenever build passed, regardless of the other legs
    # (34de6eb's concern -- a single failing leg must never block build/typecheck).
    needs: [build, typecheck, test, integration]
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' && needs.build.result == 'success' }}
    # actions: read to list the Actions cache entries being mirrored
    # (GET /repos/.../actions/caches); contents: write to upload/prune the
    # Release-asset mirror. Job-level permissions replace the workflow block
    # wholesale, so actions: read must be restated here or the caches API 404s.
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # Bootstrap so dist/bin/publish-mirror.js exists for the action to run.
      - run: npx nx build @op-nx/github-cache
      # A JS action so @actions/cache's restoreCache is handed the Actions cache
      # runtime env (there is no gh/REST download for cache content). command
      # points at the built bin directly (the bin shim isn't linked until dist/
      # exists at install time); token defaults to the job's GITHUB_TOKEN.
      - uses: ./publish-mirror
        with:
          command: node packages/op-nx-github-cache/dist/bin/publish-mirror.js
