name: CI

on:
  push:
    branches:
      - main
  pull_request:
  # TEMPORARY (debug): trusted trigger (isWriteTrusted allows workflow_dispatch)
  # for pre-merge remote-cache round-trip verification. Remove before merge.
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # --all: pull_request checkouts don't have a local `main` ref for Nx's
      # default git-diff base, so diff-based format:check always fails here.
      - run: npx nx format:check --all

  build:
    runs-on: ubuntu-latest
    # GitHub's cache-save API requires `actions: write` on the job token;
    # `actions: read` (the workflow-level default) only permits restores, so
    # every write attempt from the self-hosted cache server here silently
    # no-ops without this override.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      # node, not `npx op-nx-github-cache-serve`: npm only links a workspace
      # bin shim if its target exists at `npm ci` time, and dist/bin/*.js
      # doesn't exist until the build step above runs. This is a
      # self-consumption-only quirk (consuming repos install the published
      # package with dist/ already built), so the README's own `npx <bin>`
      # snippet stays correct for consumers -- only this repo's own dogfood
      # wiring needs the direct node invocation.
      # setsid detaches the server into its own session so it survives this
      # step's exit -- GitHub Actions' runner kills a step's whole process
      # group when the step's script finishes, and a plain `cmd &` background
      # job stays in that group.
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - run: npm run build

  typecheck:
    runs-on: ubuntu-latest
    # See build job's comment: actions: write is required for cache saves.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      # TEMPORARY (debug): redirect the detached server's stdout+stderr to a
      # PERSISTENT file (not the orphaned "Start cache server" step console),
      # so requests + @actions/cache save/restore warnings emitted during the
      # later `npm run typecheck` step are actually captured. Remove before merge.
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null > "$RUNNER_TEMP/cache-server.log" 2>&1 &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - name: Run typecheck
        run: npm run typecheck
        env:
          # Rust-side tracing for the native HttpRemoteCache client: shows the
          # store{}/retrieve{} spans in THIS (nx) step's log, proving whether Nx
          # issues the PUT/GET independently of the server-side log.
          NX_NATIVE_LOGGING: 'nx::native::cache=trace'
      # TEMPORARY (debug): surface the persistent server log after the task
      # step. Drop the ::add-mask:: line so the per-run loopback token is never
      # printed unmasked into the public log. Remove before merge.
      - name: Dump cache server log
        if: always()
        run: grep -v '::add-mask::' "$RUNNER_TEMP/cache-server.log" || true

  test:
    runs-on: ubuntu-latest
    # See build job's comment: actions: write is required for cache saves.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      - name: Start cache server
        run: |
          setsid node packages/op-nx-github-cache/dist/bin/serve.js < /dev/null &
          timeout 10 bash -c 'until grep -q NX_SELF_HOSTED_REMOTE_CACHE_SERVER "$GITHUB_ENV" 2>/dev/null; do sleep 0.2; done'
      - run: npm run test

  publish-mirror:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      - run: node packages/op-nx-github-cache/dist/bin/publish-mirror.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
