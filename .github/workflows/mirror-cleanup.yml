name: Mirror cleanup

# Prune the Release-asset cache mirror on a calendar cadence, DECOUPLED from CI.
# Retention is a rolling per-asset age (CACHE_MIRROR_MAX_AGE_DAYS, default 30d),
# NOT a month boundary, so expired assets must be pruned daily regardless of push
# activity: a push-triggered prune would never fire while the repo is idle,
# leaving expired assets serving hits past their TTL and hoarding the
# 1000-asset-per-release cap. A single scheduled job is also a single cleanup
# writer by construction -- no coordination with the per-OS publish-mirror matrix
# in ci.yml (which is upload-only).
on:
  schedule:
    # Daily at 04:17 UTC (off the top-of-hour cron congestion).
    - cron: '17 4 * * *'
  # Manual trigger for testing / on-demand pruning. Must run from the default
  # branch: resolveTrustedRepo requires GITHUB_REF == refs/heads/<default>.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-24.04-arm
    # contents: write to delete stale Release assets / empty mirror shards.
    # No actions: read -- cleanup only touches Releases, never the Actions cache.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # Bootstrap so dist/bin/publish-mirror-cleanup.js exists.
      - run: npx nx build @op-nx/github-cache
      # A plain run step is enough: cleanup drives `gh` (GH_TOKEN) only and does
      # NOT restore from the Actions cache, so it needs none of the JS-action-only
      # runtime env (ACTIONS_RUNTIME_TOKEN etc.). isWriteTrusted accepts schedule
      # and workflow_dispatch, and GITHUB_REF is refs/heads/<default> for both.
      - run: node packages/op-nx-github-cache/dist/bin/publish-mirror-cleanup.js
        env:
          GH_TOKEN: ${{ github.token }}
