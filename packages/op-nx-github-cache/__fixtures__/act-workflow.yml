# Test-only fixture for the opt-in `npm run test:act` harness (see package.json
# and README). Never run by default CI or `nx test` -- exercises the real
# @actions/cache-backed server end to end via `act`, since @actions/cache
# cannot be invoked at all outside a real (or act-emulated) Actions runner.
name: cache-server-round-trip
on: [push, pull_request_target]
jobs:
  round-trip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx nx build @op-nx/github-cache
      - name: Round-trip against the running cache server
        working-directory: packages/op-nx-github-cache
        run: node ./__fixtures__/act-round-trip.mjs
