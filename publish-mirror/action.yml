name: 'Publish @op-nx/github-cache mirror'
description: >-
  Mirror this run's GitHub Actions cache entries to a GitHub Release-asset shard
  that local development reads anonymously. Runs as a JavaScript action so
  @actions/cache's restoreCache is handed the Actions cache runtime env
  (ACTIONS_RUNTIME_TOKEN / ACTIONS_RESULTS_URL) -- cache CONTENT has no public
  REST/gh download, only the internal cache service reachable with that env, and
  that env is never present in run: shell steps. Gate to trusted main pushes.
inputs:
  token:
    description: >-
      Token for gh (Release upload/prune + the Actions caches list). Defaults to
      the job's GITHUB_TOKEN; the job must grant actions:read + contents:write.
    required: false
    default: ${{ github.token }}
  command:
    description: >-
      Command used to run publish-mirror. Defaults to the published package's
      bin; this repo overrides it to a direct `node dist/bin` path because npm
      only links the bin shim once dist/ exists at install time.
    required: false
    default: 'npx op-nx-github-cache-publish-mirror'
runs:
  using: 'node24'
  main: 'index.cjs'
