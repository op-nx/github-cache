name: 'Start @op-nx/github-cache server'
description: >-
  Start the self-hosted Nx remote cache server as a background process. Runs as a
  JavaScript action so it is handed the Actions cache runtime env
  (ACTIONS_RUNTIME_TOKEN / ACTIONS_RESULTS_URL), which GitHub never injects into
  `run:` shell steps -- and passes it to the server by process inheritance, so the
  token never has to be re-exported into $GITHUB_ENV. Only starts on trusted write
  events; fails loudly if the runtime env is missing (the cache would otherwise
  silently no-op).
inputs:
  command:
    description: >-
      Command used to launch the cache server. The default resolves the published
      package's bin from the workspace. This repo overrides it to a direct
      `node dist/bin/serve.js` because npm only links the bin shim when
      dist/ already exists at install time.
    required: false
    default: 'npx op-nx-github-cache-serve'
runs:
  using: 'node24'
  main: 'index.cjs'
